version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - notification-network

  app:
    build: .
    container_name: notification-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - redis
    restart: always
    networks:
      - notification-network

networks:
  notification-network:
    driver: bridge
