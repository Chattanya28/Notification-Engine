server.port=8080
spring.application.name=notification-gateway
logging.level.org.springframework=ERROR
logging.level.com.notification.gateway=DEBUG

# Spring Mail Config (Safe dev mock properties)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=dev@example.com
spring.mail.password=password
spring.mail.properties.mail.smtp.connectiontimeout=1000
spring.mail.properties.mail.smtp.timeout=1000
spring.mail.properties.mail.smtp.writetimeout=1000

# Spring JPA Config (Runs H2 in-memory but JPA standard)
spring.datasource.url=jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Redis Configuration (For Rate Limiting)
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Suppress Redis startup failure warning to fallback cleanly
spring.data.redis.repositories.enabled=false

# Resilience4j Webhook Circuit Breaker Config
resilience4j.circuitbreaker.instances.webhookCircuitBreaker.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.webhookCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.webhookCircuitBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.webhookCircuitBreaker.failure-rate-threshold=50.0
resilience4j.circuitbreaker.instances.webhookCircuitBreaker.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.webhookCircuitBreaker.permitted-number-of-calls-in-half-open-state=3